<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Formulário</title>
    <link rel="stylesheet" href="Atividade15.css">
</head>
<body>

    <div class="form-container">
        <h2>Formulário Principal</h2>
        
        <form name="principalForm" onsubmit="return validar()">
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

            <label for="comentario">Comentário:</label>
            <textarea id="comentario" name="comentario" rows="4"></textarea>

            <div class="pesquisa-section">
                <p>Pesquisa:</p>
                <label>Primeira vez nesta página??</label>
                <div class="radios">
                    <input type="radio" id="sim" name="pesquisa" value="Sim">
                    <label for="sim">Sim</label>
                    
                    <input type="radio" id="nao" name="pesquisa" value="Não">
                    <label for="nao">Não</label>
                </div>
            </div>

            <div class="botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
            
        </form>
    </div>

    <script src="Atividade15.js"></script>
</body>
</html>
