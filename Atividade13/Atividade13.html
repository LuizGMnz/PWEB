<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra a Janela</title>
</head>
<body>
    <h1 id="titulo" style="text-align: center;">Janela Fechada</h1>
    <div style="text-align: center;">
        <img id="janela" src="fechada.jpg" alt="Janela Fechada"
            onmouseover="mOverAbrir()"
            onmouseout="mOutFechar()"
            onclick="mClickQuebra()">
    </div>

    <script>
        function mOverAbrir(){
            document.getElementById("janela").src = "aberta.jpg";
            document.getElementById("titulo").innerHTML = "Janela Aberta";
        }

        function mOutFechar(){
            document.getElementById("janela").src = "fechada.jpg";
            document.getElementById("titulo").innerHTML = "Janela Fechada";
        }

        function mClickQuebra(){
            document.getElementById("janela").src = "quebrada.jpg";
            document.getElementById("titulo").innerHTML = "Janela Quebrada";
        }
    </script>
</body>
</html>
